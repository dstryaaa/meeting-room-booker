<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Room Booker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-md mb-6">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">📅 Meeting Room Booker</h1>
            <div class="flex items-center gap-4">
                <span id="user-name" class="text-sm text-gray-600">Загрузка...</span>
                <button onclick="logout()" class="text-red-500 hover:text-red-700 text-sm font-medium">
                    Выйти
                </button>
            </div>
        </div>
    </nav>

    <div class="container-custom">
        <!-- Уведомления -->
        <div id="notification" class="hidden p-4 rounded-lg mb-4"></div>

        <!-- Контент загружается через HTMX -->
        <div id="content">
            <div class="text-center text-gray-500 py-10">
                Загрузка...
            </div>
        </div>
    </div>

    <style>
        .container-custom { max-width: 64rem; margin: 0 auto; padding: 1rem; }
        .card { background: white; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; margin-bottom: 1.5rem; }
        .btn-primary { background-color: #3b82f6; color: white; font-weight: 500; padding: 0.5rem 1rem; border-radius: 0.375rem; transition: 0.2s; border: none; cursor: pointer; width: 100%; }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-danger { background-color: #ef4444; color: white; font-weight: 500; padding: 0.25rem 0.75rem; border-radius: 0.375rem; transition: 0.2s; border: none; cursor: pointer; font-size: 0.875rem; }
        .btn-danger:hover { background-color: #dc2626; }
        .input-field { width: 100%; border: 1px solid #d1d5db; border-radius: 0.375rem; padding: 0.5rem 0.75rem; outline: none; }
        .input-field:focus { outline: none; ring: 2px solid #3b82f6; }
        .label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem; }
    </style>

    <script>
        // ============================================
        // ГЛОБАЛЬНЫЕ ФУНКЦИИ (доступны везде)
        // ============================================

        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/auth';
        }

        // Показываем имя пользователя
        const userName = localStorage.getItem('user_name') || 'Пользователь';
        document.getElementById('user-name').textContent = '👤 ' + userName;

        // Показ уведомлений
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'p-4 rounded-lg mb-4';
            
            if (type === 'success') {
                notification.classList.add('bg-green-100', 'text-green-700', 'border', 'border-green-400');
            } else {
                notification.classList.add('bg-red-100', 'text-red-700', 'border', 'border-red-400');
            }
            
            notification.classList.remove('hidden');
            
            setTimeout(() => {
                notification.classList.add('hidden');
            }, 5000);
        }

        // Выход
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user_id');
            localStorage.removeItem('user_name');
            window.location.href = '/auth';
        }

        // ============================================
        // ФУНКЦИИ ДЛЯ ДАШБОРДА
        // ============================================

        // Загрузка списка бронирований
        function loadBookings() {
            const container = document.getElementById('bookings-list');
            if (!container) return;
            
            container.innerHTML = '<div class="text-center text-gray-500 py-4">Загрузка...</div>';

            fetch('/api/bookings?limit=20', {
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                }
            })
            .then(response => {
                if (response.status === 401) {
                    logout();
                    return;
                }
                return response.json();
            })
            .then(data => {
                if (data && data.data) {
                    renderBookings(data);
                }
            })
            .catch(() => {
                container.innerHTML = '<div class="text-center text-red-500 py-4">Ошибка загрузки</div>';
            });
        }

        function renderBookings(data) {
            const container = document.getElementById('bookings-list');
            if (!container) return;
            
            if (data.data.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-4">Нет бронирований</div>';
                return;
            }

            let html = '<div class="space-y-2">';
            data.data.forEach(booking => {
                html += `
                    <div class="border border-gray-200 rounded p-3 flex justify-between items-center">
                        <div>
                            <div class="font-medium text-gray-800">${booking.purpose}</div>
                            <div class="text-sm text-gray-500">
                                ${booking.booking_date} ${booking.start_time}-${booking.end_time}
                                (Комната ${booking.room_id})
                            </div>
                        </div>
                        <button onclick="cancelBooking(${booking.id})" 
                                class="btn-danger">
                            Отменить
                        </button>
                    </div>
                `;
            });
            html += '</div>';
            
            container.innerHTML = html;
        }

        // Отмена бронирования
        function cancelBooking(bookingId) {
            if (!confirm('Отменить бронирование?')) return;
            
            fetch('/api/bookings/' + bookingId, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                }
            })
            .then(response => {
                if (response.status === 204) {
                    showNotification('Бронирование отменено', 'success');
                    loadBookings();
                } else {
                    showNotification('Ошибка отмены', 'error');
                }
            })
            .catch(() => {
                showNotification('Ошибка отмены', 'error');
            });
        }

        // ============================================
        // ФУНКЦИИ ДЛЯ ФОРМЫ БРОНИРОВАНИЯ
        // ============================================

function loadBookingForm() {
    const container = document.getElementById('booking-form-container');
    if (!container) return;
    
    container.innerHTML = '<div class="text-center text-gray-500 py-4">Загрузка...</div>';

    fetch('/booking-form', {
        headers: {
            'Authorization': 'Bearer ' + localStorage.getItem('token')
        }
    })
    .then(response => response.text())
    .then(html => {
        container.innerHTML = html;
        // ДАЕМ ВРЕМЯ НА РЕНДЕРИНГ
        setTimeout(() => {
            initBookingForm();
        }, 50);
    })
    .catch(() => {
        container.innerHTML = '<div class="text-center text-red-500 py-4">Ошибка загрузки формы</div>';
    });
}

function initBookingForm() {
    console.log('🔄 initBookingForm: началась');
    
    // Загружаем комнаты
    fetch('/api/rooms', {
        headers: {
            'Authorization': 'Bearer ' + localStorage.getItem('token')
        }
    })
    .then(response => response.json())
    .then(rooms => {
        const select = document.querySelector('select[name="room_id"]');
        if (!select) {
            console.error('❌ Селект комнат не найден');
            return;
        }
        
        console.log('✅ Найдено комнат:', rooms.length);
        
        // Очищаем селект (кроме первого пустого option)
        select.innerHTML = '<option value="">Выберите комнату</option>';
        
        rooms.forEach(room => {
            const option = document.createElement('option');
            option.value = room.id;
            option.textContent = `${room.name} (${room.capacity} мест)`;
            select.appendChild(option);
        });
    })
    .catch(error => {
        console.error('❌ Ошибка загрузки комнат:', error);
    });

    // Генерируем временные слоты
    const timeSelect = document.querySelector('select[name="start_time"]');
    if (!timeSelect) {
        console.error('❌ Селект времени не найден');
        return;
    }
    
    // Очищаем селект
    timeSelect.innerHTML = '<option value="">Выберите время</option>';
    
    for (let hour = 9; hour < 18; hour++) {
        for (let minute = 0; minute < 60; minute += 30) {
            const time = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
            const option = document.createElement('option');
            option.value = time;
            option.textContent = time;
            timeSelect.appendChild(option);
        }
    }
    
    console.log('✅ Временные слоты созданы');

    // Обработка отправки формы
    const form = document.getElementById('create-booking-form');
    if (form) {
        // Убираем старый обработчик, чтобы не дублировать
        form.onsubmit = null;
        
        form.onsubmit = function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const roomId = parseInt(formData.get('room_id'));
            const bookingDate = formData.get('booking_date');
            const startTime = formData.get('start_time');
            const purpose = formData.get('purpose');
            
            // Валидация
            if (!roomId || !bookingDate || !startTime || !purpose) {
                showNotification('Заполните все поля', 'error');
                return;
            }
            
            // Вычисляем end_time (начало + 30 минут)
            const [hours, minutes] = startTime.split(':').map(Number);
            let endHour = hours;
            let endMinute = minutes + 30;
            if (endMinute >= 60) {
                endHour += 1;
                endMinute -= 60;
            }
            const endTime = `${String(endHour).padStart(2, '0')}:${String(endMinute).padStart(2, '0')}`;
            
            const data = {
                room_id: roomId,
                booking_date: bookingDate,
                start_time: startTime,
                end_time: endTime,
                purpose: purpose
            };
            
            console.log('📤 Отправка бронирования:', data);
            
            fetch('/api/bookings', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token'),
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (response.status === 201) {
                    showNotification('Бронирование создано!', 'success');
                    loadBookings();
                    form.reset();
                    // Сбрасываем селекты
                    const roomSelect = document.querySelector('select[name="room_id"]');
                    if (roomSelect) roomSelect.value = '';
                    const timeSelect = document.querySelector('select[name="start_time"]');
                    if (timeSelect) timeSelect.value = '';
                } else {
                    return response.json().then(err => {
                        throw new Error(err.error || 'Ошибка создания');
                    });
                }
            })
            .catch(error => {
                console.error('❌ Ошибка:', error);
                showNotification(error.message, 'error');
            });
        };
        
        console.log('✅ Обработчик формы установлен');
    } else {
        console.error('❌ Форма не найдена');
    }
}
        // ============================================
        // ЗАГРУЗКА ДАШБОРДА
        // ============================================

        function loadDashboard() {
            fetch('/dashboard', {
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                }
            })
            .then(response => response.text())
            .then(html => {
                document.getElementById('content').innerHTML = html;
                // После загрузки дашборда — загружаем данные
                loadBookings();
                loadBookingForm();
            })
            .catch(() => {
                showNotification('Ошибка загрузки данных', 'error');
            });
        }

        // ============================================
        // ОБРАБОТЧИКИ HTMX
        // ============================================

        document.addEventListener('htmx:responseError', function(evt) {
            if (evt.detail.xhr.status === 401) {
                logout();
            } else {
                showNotification('Ошибка: ' + evt.detail.xhr.statusText, 'error');
            }
        });

        document.addEventListener('htmx:afterRequest', function(evt) {
            if (evt.detail.xhr.status === 401) {
                logout();
            }
        });

        // ============================================
        // СТАРТ
        // ============================================

        // Загружаем главную страницу
        loadDashboard();
    </script>
</body>
</html>
